  "@context": "https://schema.org",

  "operatingSystem": "Any (browser-based)",
  "inLanguage": "en",
  "description": "Free browser tool to overlay a labeled coordinate grid on any photo or map and export it as a print-ready PDF. No signup, runs entirely in your browser.",

    "Grid by number of cells or by cell size in pixels",

    "Inside or outside label placement",
    "Top-left or bottom-left origin",
    "PDF export at full image resolution"
  ]

<body>
<div class="app">
  <header class="header">
    <div class="header-top">
      <h1>GridGen</h1>
      <nav class="header-nav" aria-label="Documentation">
        <details class="lang-switch"><summary aria-label="Language" title="Language"><svg viewBox="0 0 60 30" class="flag-svg" aria-hidden="true"><rect width="60" height="30" fill="#012169"/><path d="M0 0L60 30M60 0L0 30" stroke="#fff" stroke-width="6"/><path d="M0 0L60 30M60 0L0 30" stroke="#C8102E" stroke-width="4"/><path d="M30 0V30M0 15H60" stroke="#fff" stroke-width="10"/><path d="M30 0V30M0 15H60" stroke="#C8102E" stroke-width="6"/></svg><span class="lang-code">EN</span><svg class="lang-caret" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></summary><div class="lang-menu" role="menu"><a hreflang="en" href="index.html" role="menuitem" aria-current="true" class="active"><svg viewBox="0 0 60 30" class="flag-svg" aria-hidden="true"><rect width="60" height="30" fill="#012169"/><path d="M0 0L60 30M60 0L0 30" stroke="#fff" stroke-width="6"/><path d="M0 0L60 30M60 0L0 30" stroke="#C8102E" stroke-width="4"/><path d="M30 0V30M0 15H60" stroke="#fff" stroke-width="10"/><path d="M30 0V30M0 15H60" stroke="#C8102E" stroke-width="6"/></svg><span>English</span></a><a hreflang="nl" href="nl/index.html" role="menuitem"><svg viewBox="0 0 60 30" class="flag-svg" aria-hidden="true"><rect width="60" height="30" fill="#21468B"/><rect width="60" height="20" fill="#fff"/><rect width="60" height="10" fill="#AE1C28"/></svg><span>Nederlands</span></a><a hreflang="de" href="de/index.html" role="menuitem"><svg viewBox="0 0 60 30" class="flag-svg" aria-hidden="true"><rect width="60" height="30" fill="#FFCE00"/><rect width="60" height="20" fill="#DD0000"/><rect width="60" height="10" fill="#000"/></svg><span>Deutsch</span></a></div></details>
        <a href="wiki/index.html">Docs &amp; Wiki</a>
      </nav>
    </div>
    <p>Upload an image, lay a coordinate grid over it, export as PDF.</p>
  </header>

  <main class="main">
    <aside class="controls">
      <!-- Upload -->
      <section>
        <div class="section-label">Image</div>
        <label class="upload-zone" id="uploadZone">
          <div id="uploadEmpty">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p><strong>Click or drop image</strong></p>
            <p class="hint">PNG, JPG, WEBP</p>
          </div>
          <div id="uploadFilled" style="display:none">
            <div class="file-info">
              <span class="file-info-name" id="fileName"></span>
              <span class="file-info-replace">Replace</span>
            </div>
          </div>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </label>
      </section>

      <!-- Grid -->
      <section>
        <div class="section-label">Grid</div>
        <div class="tabs">
          <button class="active" data-mode="cells">By cells</button>
          <button data-mode="size">By size</button>
        </div>

        <div id="cellsControls">
          <div class="field-row">
            <div class="field">
              <div class="field-label">Columns</div>
              <input type="number" id="cols" value="10" min="1" max="100">
            </div>
            <div class="field">
              <div class="field-label">Rows</div>
              <input type="number" id="rows" value="10" min="1" max="100">
            </div>
          </div>
        </div>

        <div id="sizeControls" style="display:none">
          <div class="field">
            <div class="field-label">Cell size <span class="value"><span id="cellSizeVal">50</span> px</span></div>
            <input type="number" id="cellSize" value="50" min="5" max="500">
          </div>
        </div>
      </section>

      <!-- Appearance -->
      <section>
        <div class="section-label">Appearance</div>

        <div class="field">
          <div class="field-label">Color</div>
          <div class="color-row">
            <div class="color-swatch active" data-color="#000000" style="background:#000000"></div>
            <div class="color-swatch" data-color="#ffffff" style="background:#ffffff"></div>
            <div class="color-swatch" data-color="#dc2626" style="background:#dc2626"></div>
            <div class="color-swatch" data-color="#2563eb" style="background:#2563eb"></div>
            <div class="color-swatch" data-color="#16a34a" style="background:#16a34a"></div>
            <div class="color-swatch" id="customColor" style="background:conic-gradient(from 0deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000)">
              <input type="color" id="customColorInput" value="#000000">
            </div>
          </div>
        </div>

        <div class="field">
          <div class="field-label">Line thickness <span class="value"><span id="thicknessVal">2</span> px</span></div>
          <input type="range" id="thickness" min="1" max="10" step="1" value="2">
        </div>

        <div class="field">
          <div class="field-label">Opacity <span class="value"><span id="opacityVal">100</span>%</span></div>
          <input type="range" id="opacity" min="10" max="100" step="5" value="100">
        </div>
      </section>

      <!-- Labels -->
      <section>
        <div class="toggle-row">
          <div class="section-label" style="margin-bottom:0">Coordinates</div>
          <div class="switch on" id="labelsToggle"></div>
        </div>

        <div class="label-controls" id="labelControls">
          <div class="field">
            <div class="field-label">Style</div>
            <div class="segmented" data-name="style">
              <button class="active" data-value="chess">Chess (A1)</button>
              <button data-value="numeric">Numeric (1,1)</button>
            </div>
          </div>

          <div class="field">
            <div class="field-label">Position</div>
            <div class="segmented" data-name="position">
              <button class="active" data-value="outside">Outside</button>
              <button data-value="inside">Inside</button>
            </div>
          </div>

          <div class="field">
            <div class="field-label">Origin</div>
            <div class="segmented" data-name="origin">
              <button class="active" data-value="top-left">Top-left</button>
              <button data-value="bottom-left">Bottom-left</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Export -->
      <section class="export-section">
        <button class="export-btn" id="exportBtn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
      </section>
    </aside>

    <section class="preview" id="preview">
      <div class="preview-empty" id="previewEmpty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
        <p>No image yet</p>
        <p class="hint">Upload or drop an image to get started</p>
      </div>
      <div class="preview-container" id="previewContainer" style="display:none">
        <div class="canvas-wrap">
          <canvas id="canvas"></canvas>
        </div>
        <div class="info-bar" id="infoBar"></div>
      </div>
    </section>
  </main>
</div>

<script src="gridgen.js"></script>
</body>
</html>
